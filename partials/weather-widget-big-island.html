<!--
  WHAW Weather Widget — Big Island drop-in partial.
  Sources: Open-Meteo (current conditions), NOAA Tides & Currents (Honolulu station 1617760), Windy.com (radar iframe).
  Coordinates: Big Island / Honolulu (19.7297, -155.0900). No API keys required.
  Self-contained: includes scoped CSS in <style> and JS in <script>.
  Inject between the filter-section close and <section id="tours-section">.
-->
<!-- WEATHER WIDGET START -->
<section class="kwst-weather" id="weather" aria-labelledby="kwst-weather-heading">
    <style>
        .kwst-weather {
            padding: 36px 16px;
            background: linear-gradient(180deg, #FDF8F0 0%, #e6f4f8 100%);
            color: #1B3A57;
        }
        .kwst-weather .weather-inner { max-width: 1200px; margin: 0 auto; }
        .kwst-weather .weather-header { text-align: center; margin-bottom: 20px; }
        .kwst-weather .weather-header h2 {
            font-size: 1.5rem;
            font-weight: 800;
            color: #1B3A57;
            margin: 0 0 6px;
            line-height: 1.2;
        }
        .kwst-weather .weather-header p { color: #555; font-size: 1rem; margin: 0 0 16px; }
        .kwst-weather .header-weather {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 8px 18px;
            background: white;
            border-radius: 999px;
            box-shadow: 0 2px 8px rgba(27, 58, 87, 0.1);
            font-size: 0.95rem;
        }
        .kwst-weather .weather-icon { font-size: 1.2rem; }
        .kwst-weather .weather-temp { font-weight: 700; color: #1B3A57; }
        .kwst-weather .weather-location { color: #666; }
        .kwst-weather .weather-radar {
            border-radius: 14px;
            overflow: hidden;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.12);
            margin-bottom: 20px;
            background: #1B3A57;
        }
        .kwst-weather .weather-radar iframe {
            display: block;
            width: 100%;
            height: 300px;
            border: 0;
        }
        .kwst-weather .weather-ticker-wrap {
            overflow: hidden;
            background: linear-gradient(135deg, #1B3A57 0%, #3BB8C3 100%);
            border-radius: 10px;
            padding: 12px 0;
            box-shadow: 0 4px 15px rgba(27, 58, 87, 0.2);
        }
        .kwst-weather .weather-ticker {
            display: flex;
            gap: 36px;
            animation: kwstTickerScroll 25s linear infinite;
            width: max-content;
            padding: 0 16px;
        }
        .kwst-weather .weather-ticker-wrap:hover .weather-ticker,
        .kwst-weather .weather-ticker-wrap:focus-within .weather-ticker {
            animation-play-state: paused;
        }
        .kwst-weather .ticker-item {
            display: flex;
            align-items: center;
            gap: 6px;
            color: white;
            font-size: 0.92rem;
            font-weight: 500;
            white-space: nowrap;
        }
        .kwst-weather .ticker-icon { font-size: 1.1rem; }
        @keyframes kwstTickerScroll {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }
        @media (min-width: 768px) {
            .kwst-weather { padding: 56px 24px; }
            .kwst-weather .weather-header h2 { font-size: 2rem; }
            .kwst-weather .weather-radar iframe { height: 400px; }
        }
        @media (max-width: 540px) {
            .kwst-weather .weather-ticker { gap: 22px; animation-duration: 22s; }
            .kwst-weather .ticker-item { font-size: 0.82rem; }
            .kwst-weather .header-weather { font-size: 0.88rem; padding: 7px 14px; }
        }
        @media (prefers-reduced-motion: reduce) {
            .kwst-weather .weather-ticker { animation: none; }
        }
    </style>
    <div class="weather-inner">
        <div class="weather-header">
            <h2 id="kwst-weather-heading">Big Island Live Conditions</h2>
            <p>Real-time weather, radar, and tides — plan around the day.</p>
            <div class="header-weather" id="kwst-header-weather" aria-live="polite">
                <span class="weather-icon">☀️</span>
                <span class="weather-temp">--°F</span>
                <span class="weather-location">Big Island</span>
            </div>
        </div>
        <div class="weather-radar">
            <iframe
                src="https://embed.windy.com/embed2.html?lat=19.7297&lon=-155.0900&zoom=8&level=surface&overlay=wind&menu=&message=true&marker=true&calendar=&pressure=&type=map&location=coordinates&detail=&detailLat=19.7297&detailLon=-155.0900&metricWind=default&metricTemp=default&radarRange=-1"
                width="100%"
                height="400"
                frameborder="0"
                loading="lazy"
                title="Big Island weather radar (Windy.com)">
            </iframe>
        </div>
        <div class="weather-ticker-wrap" aria-label="Live Big Island conditions">
            <div class="weather-ticker" id="kwst-weather-ticker">
                <div class="ticker-item"><span class="ticker-icon">🌡️</span> <span class="kwst-wx-temp">--</span>°F</div>
                <div class="ticker-item"><span class="ticker-icon">💧</span> Humidity: <span class="kwst-wx-humidity">--</span>%</div>
                <div class="ticker-item"><span class="ticker-icon">💨</span> Wind: <span class="kwst-wx-wind">--</span> mph</div>
                <div class="ticker-item"><span class="ticker-icon">☀️</span> UV: <span class="kwst-wx-uv">--</span></div>
                <div class="ticker-item"><span class="ticker-icon">🌊</span> Next tide: <span class="kwst-wx-tide">--</span></div>
                <div class="ticker-item"><span class="ticker-icon">👁️</span> Visibility: <span class="kwst-wx-vis">--</span> mi</div>
                <!-- Duplicate row for seamless loop -->
                <div class="ticker-item" aria-hidden="true"><span class="ticker-icon">🌡️</span> <span class="kwst-wx-temp">--</span>°F</div>
                <div class="ticker-item" aria-hidden="true"><span class="ticker-icon">💧</span> Humidity: <span class="kwst-wx-humidity">--</span>%</div>
                <div class="ticker-item" aria-hidden="true"><span class="ticker-icon">💨</span> Wind: <span class="kwst-wx-wind">--</span> mph</div>
                <div class="ticker-item" aria-hidden="true"><span class="ticker-icon">☀️</span> UV: <span class="kwst-wx-uv">--</span></div>
                <div class="ticker-item" aria-hidden="true"><span class="ticker-icon">🌊</span> Next tide: <span class="kwst-wx-tide">--</span></div>
                <div class="ticker-item" aria-hidden="true"><span class="ticker-icon">👁️</span> Visibility: <span class="kwst-wx-vis">--</span> mi</div>
            </div>
        </div>
    </div>
</section>
<script>
(function() {
    var ISLAND_LAT = 19.7297;
    var ISLAND_LON = -155.0900;
    var TIDE_STATION = 1617760; // Hilo, HI — NOAA Tides & Currents

    function setAll(selector, value) {
        document.querySelectorAll(selector).forEach(function(el) { el.textContent = value; });
    }

    function weatherEmoji(code) {
        if (code === 0) return '☀️';
        if (code === 1 || code === 2) return '🌤️';
        if (code === 3) return '☁️';
        if (code >= 51 && code <= 67) return '🌧️';
        if (code >= 71 && code <= 77) return '🌨️';
        if (code >= 80 && code <= 82) return '🌦️';
        if (code >= 95) return '⛈️';
        return '☀️';
    }

    async function fetchWeather() {
        try {
            var url = 'https://api.open-meteo.com/v1/forecast?latitude=' + ISLAND_LAT +
                '&longitude=' + ISLAND_LON +
                '&current=temperature_2m,relative_humidity_2m,wind_speed_10m,uv_index,visibility,weather_code' +
                '&temperature_unit=fahrenheit&wind_speed_unit=mph&timezone=Pacific%2FHonolulu';
            var res = await fetch(url);
            if (!res.ok) return;
            var data = await res.json();
            if (!data || !data.current) return;
            var c = data.current;
            var temp = Math.round(c.temperature_2m);
            var humidity = Math.round(c.relative_humidity_2m);
            var wind = Math.round(c.wind_speed_10m);
            var uv = (c.uv_index != null) ? Number(c.uv_index).toFixed(1) : '--';
            var vis = c.visibility ? Math.round(c.visibility / 1609.34) : '--';
            var emoji = weatherEmoji(c.weather_code);

            var pill = document.getElementById('kwst-header-weather');
            if (pill) {
                var tempEl = pill.querySelector('.weather-temp');
                var iconEl = pill.querySelector('.weather-icon');
                if (tempEl) tempEl.textContent = temp + '°F';
                if (iconEl) iconEl.textContent = emoji;
            }
            setAll('.kwst-wx-temp', temp);
            setAll('.kwst-wx-humidity', humidity);
            setAll('.kwst-wx-wind', wind);
            setAll('.kwst-wx-uv', uv);
            setAll('.kwst-wx-vis', vis);
        } catch (err) {
            console.log('WHAW weather fetch failed:', err);
        }
    }

    async function fetchTide() {
        try {
            var url = 'https://api.tidesandcurrents.noaa.gov/api/prod/datagetter?date=today&station=' +
                TIDE_STATION +
                '&product=predictions&datum=MLLW&time_zone=lst_ldt&interval=hilo&units=english&format=json';
            var res = await fetch(url);
            if (!res.ok) return;
            var data = await res.json();
            if (!data || !data.predictions || !data.predictions.length) return;
            var now = Date.now();
            var next = null;
            for (var i = 0; i < data.predictions.length; i++) {
                if (new Date(data.predictions[i].t).getTime() > now) {
                    next = data.predictions[i];
                    break;
                }
            }
            if (!next) return;
            var type = next.type === 'H' ? 'High' : 'Low';
            var when = new Date(next.t).toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
            setAll('.kwst-wx-tide', type + ' @ ' + when);
        } catch (err) {
            console.log('WHAW tide fetch failed:', err);
        }
    }

    function refresh() {
        fetchWeather();
        fetchTide();
    }

    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', refresh);
    } else {
        refresh();
    }
    // Refresh every 15 minutes
    setInterval(refresh, 15 * 60 * 1000);
})();
</script>
<!-- WEATHER WIDGET END -->
